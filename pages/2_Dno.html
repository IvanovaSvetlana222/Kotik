<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <style>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {

            padding: 0;
            background-color: #000;
            color: white;
            overflow: hidden;
            font-family: Arial, sans-serif;
            height: 100vh;
        }
        
        .video-container {
            position: fixed;
            top: 0;
            width: 25vw;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }
        
        #left-video {

        #right-video {

        }
        
        video {

            height: 100%;

        }
        
        .content-background {

            top: 0;

            backdrop-filter: blur(5px);

        .content {

<body>
    <!-- Видео по бокам -->
    <div class="video-container" id="left-video">

        </div>
    </div>
    
    <div class="video-container" id="right-video">
        <video autoplay loop muted playsinline>
            <source src="../video/konek.mp4" type="video/mp4">
        </video>
    </div>
    
    <!-- Полупрозрачная плашка -->
    <div class="content-background"></div>
    
    <!-- Контент с заданием -->
    <div class="content">
        <div class="header">
            <div class="header-text">Правописание безударных гласных в корне слова</div>
        </div>
        
        <div class="text-container">
            <div class="text-content" id="textContainer"></div>
            <div class="author-signature" id="authorSignature">(По В.П. Катаеву)</div>
        </div>
        
        <div class="buttons-container" id="buttonsContainer">

        </div>
        
        <div class="result-container" id="gradeResult"></div>
        <div class="result-container" id="statsResult"></div>

    <script>
        // ===== ЗАЩИТА ОТ ПРОСМОТРА КОДА ===== //
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I', 'J'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                alert('Доступ к коду ограничен!');
            }
        });

        // ===== ЗАШИФРОВАННЫЕ ДАННЫЕ ===== //
        const encryptedData = {
            text: "ОчXXрование моря заключается в какой-то тайне, которую оно всегда хрXXнит в своих пространствах... Медуза вXXсела прозрачным абXXжуром с кистью таких же прозрачных щупалец. Осторожно – чтобы не прикXXснуться к ядовитой кайме, обжXXгающей, как крапива, – Петя обеими руками схвXXтил медузу за купол и вытащил увесистое, но непрочное её тело из воды. Солнце блXXстало, зажXXгаясь в её слизи золотой звёздочкой... Потом Петя стал нырять с открытыми глазами. Какое это упXXение! На глубине возникал удXXвительный мир подводного царства. Стебли подводных рXXстений составляли сказочный лес. Среди корней проворно пробXXрался боком большой старый краб. Он нёс на своих паучьих ногах дугую коробочку спины, покрытую известковыми бородавками мXXллюсков. Но гораздо интереснее казались морские коньки. Как раз небольшая их стайка поXXвилась среди водорXXслей. С точеными мордочками и грудками они плыли стоймя, прямо на Петю, распустив перепончатые плXXвники крошечных подводных драконов. Как видно, они совсем не предполXXгали, что могут в такой ранний час наткнуться на охотника.",
            answers: [1, 1, 10, 1, 16, 10, 1, 10, 10, 16, 10, 1, 10, 16, 33, 16, 1, 1],
            // Для каждого пропуска указываем возможные варианты букв, которые можно перепутать
            possibleLetters: [
                ['я', 'а', 'и', 'е'],    // ОчАрование
                ['а', 'о'],              // хрАнит
                ['е', 'и'],              // вИсела
                ['а', 'о'],              // абАжуром
                ['а', 'о'],              // прикОснуться
                ['и', 'е'],              // обжИгающей
                ['а', 'о'],              // схвАтил
                ['и', 'е'],              // блЕстало
                ['и', 'е'],              // зажИгаясь
                ['о', 'а'],              // упОение
                ['и', 'е'],              // удИвительный
                ['о', 'а'],              // рАстений
                ['и', 'е'],              // пробИрался
                ['а', 'о'],              // мОллюсков
                ['е', 'я', 'и'],         // поЯвилась
                ['а', 'о'],              // водорОслей
                ['о', 'а'],              // плАвники
                ['а', 'о']               // предполАгали
            ]
        };

        // ===== ФУНКЦИЯ ДЛЯ РАСШИФРОВКИ ОТВЕТОВ ===== //
        function getCorrectAnswer(code) {
            const alphabet = 'абвгдеёжзийклмнопрстуфхцчшщъыьэюя';
            return alphabet[code - 1];
        }

        // ===== ОСНОВНОЙ КОД ТРЕНАЖЕРА ===== //
        const elements = {
            enableBtn: document.getElementById('enableBtn'),
            checkBtn: document.getElementById('checkBtn'),
            gradeBtn: document.getElementById('gradeBtn'),
            clearBtn: document.getElementById('clearBtn'),
            nextBtn: document.getElementById('nextBtn'),
            textContainer: document.getElementById('textContainer'),
            gradeResult: document.getElementById('gradeResult'),
            statsResult: document.getElementById('statsResult'),
            buttonsContainer: document.getElementById('buttonsContainer'),
            sideSoundBtn: document.getElementById('side-sound-btn'),
            leftVideo: document.getElementById('left-video-element'),
            authorSignature: document.getElementById('authorSignature'),
            teamLabel: document.querySelector('.team-label')
        };

        let state = {
            attempts: 0,
            totalCorrect: 0,
            totalQuestions: encryptedData.answers.length,
            bestScore: 0,
            soundEnabled: false,
            teamScore: 0
        };

        // ===== СОЗДАНИЕ УПРАЖНЕНИЯ С ВЫПАДАЮЩИМИ СПИСКАМИ ===== //
        function createExercise() {
            let html = '';
            let gapIndex = 0;
            
            for (let i = 0; i < encryptedData.text.length; i++) {
                if (encryptedData.text.substr(i, 2) === 'XX') {
                    html += `<span class="gap-container">
                        <select class="gap-select" data-index="${gapIndex}">
                            <option value=""></option>`; // Пустой вариант по умолчанию
                    
                    // Добавляем только те буквы, которые можно перепутать для данного пропуска
                    encryptedData.possibleLetters[gapIndex].forEach(letter => {
                        html += `<option value="${letter}">${letter}</option>`;
                    });
                    
                    html += `</select></span>`;
                    gapIndex++;
                    i++;
                } else {
                    html += encryptedData.text[i];
                }
            }
            
            elements.textContainer.innerHTML = html;
            setupSelectNavigation();
            elements.authorSignature.style.display = 'block';
        }

        // ===== НАСТРОЙКА ПЕРЕХОДА МЕЖДУ ВЫПАДАЮЩИМИ СПИСКАМИ ===== //
        function setupSelectNavigation() {
            const selects = document.querySelectorAll('.gap-select');
            
            selects.forEach((select, index) => {
                select.addEventListener('change', (e) => {
                    if (index < selects.length - 1) {
                        setTimeout(() => {
                            selects[index + 1].focus();
                        }, 10);
                    }
                });
                
                select.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft' && index > 0) {
                        selects[index - 1].focus();
                        e.preventDefault();
                    } else if (e.key === 'ArrowRight' && index < selects.length - 1) {
                        selects[index + 1].focus();
                        e.preventDefault();
                    }
                });
            });
            
            if (selects.length > 0) {
                selects[0].focus();
            }
        }

        // ===== ПРОВЕРКА ОТВЕТОВ ===== //
        function checkAnswers() {
            let correctCount = 0;
            document.querySelectorAll('.gap-select').forEach(select => {
                const userAnswer = select.value.toLowerCase();
                const correctAnswer = getCorrectAnswer(encryptedData.answers[parseInt(select.dataset.index)]);
                
                select.classList.remove('correct', 'incorrect');
                select.classList.add(userAnswer === correctAnswer ? 'correct' : 'incorrect');
                if (userAnswer === correctAnswer) correctCount++;
            });
            return correctCount;
        }

        // ===== СОХРАНЕНИЕ РЕЗУЛЬТАТА КОМАНДЫ ===== //
        function saveTeamScore(score) {
            localStorage.setItem('team2Score', score);
        }

        // ===== ОБРАБОТЧИКИ СОБЫТИЙ ===== //
        elements.enableBtn.addEventListener('click', () => {
            createExercise();
            elements.checkBtn.style.display = 'flex';
            elements.gradeBtn.style.display = 'flex';
            elements.clearBtn.style.display = 'flex';
            elements.enableBtn.style.display = 'none';
            elements.teamLabel.style.display = 'none';
        });

        elements.checkBtn.addEventListener('click', () => {

    const correct = checkAnswers();
    state.attempts++;
    state.totalCorrect += correct;
    state.bestScore = Math.max(state.bestScore, correct);
    
    if (state.attempts === 1) {
        state.teamScore = correct;
        saveTeamScore(correct);
    }
    
    elements.gradeResult.textContent = `Правильных ответов: ${correct} из ${state.totalQuestions}`;
    elements.statsResult.textContent = `Попыток: ${state.attempts} | Лучший: ${state.bestScore}/${state.totalQuestions}`;
    
    elements.gradeResult.style.display = 'block';
    elements.statsResult.style.display = 'block';

    if (correct >= 14) {

        // выключаем звук, если он был включён
        elements.leftVideo.muted = true;
        state.soundEnabled = false;
        elements.sideSoundBtn.innerHTML = '🔇 Включить звук';

        // сообщаем основной странице
        window.parent.postMessage({ type: "tabletSuccess" }, "*");
    }

});

        elements.gradeBtn.addEventListener('click', () => {
            const correct = checkAnswers();
            const percentage = Math.round((correct / state.totalQuestions) * 100);
            const grade = percentage >= 90 ? "5" : percentage >= 75 ? "4" : percentage >= 50 ? "3" : "2";
            
            elements.gradeResult.textContent = `Оценка: ${grade} (${percentage}%)`;
            elements.statsResult.textContent = `Правильно: ${correct} из ${state.totalQuestions}`;
            elements.gradeResult.style.display = 'block';
            elements.statsResult.style.display = 'block';
        });

        elements.clearBtn.addEventListener('click', () => {
            document.querySelectorAll('.gap-select').forEach(select => {
                select.value = '';
                select.classList.remove('correct', 'incorrect');
            });
            elements.gradeResult.style.display = 'none';
            elements.statsResult.style.display = 'none';
        });

        // Управление звуком видео медузы
        elements.sideSoundBtn.addEventListener('click', function() {
            state.soundEnabled = !state.soundEnabled;
            elements.leftVideo.muted = !state.soundEnabled;
            this.innerHTML = state.soundEnabled ? '🔊 Выключить звук' : '🔇 Включить звук';
            if (state.soundEnabled) elements.leftVideo.play().catch(e => console.log("Ошибка воспроизведения:", e));
        });

        // Инициализация состояния звука
        elements.leftVideo.muted = true;
        elements.sideSoundBtn.innerHTML = '🔇 Включить звук';
        state.soundEnabled = false;

        // Запуск видео при первом клике
        document.body.addEventListener('click', () => {
            elements.leftVideo.play().catch(e => console.log("Ошибка видео:", e));
        }, { once: true });
    </script>
</body>
</html>
