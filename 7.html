<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новогодние задания - 20 шариков</title>
    <!-- Подключаем шрифт Lobster -->
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
            background-color: #3498db;
            user-select: none;
            touch-action: pan-y;
        }

        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #3498db;
        }

        #video-background {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Fallback для видео */
        #video-fallback {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #3498db, #2980b9);
            z-index: -2;
            display: none;
        }

        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ИНСТРУКЦИЯ */
        #instruction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #instruction-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        #instruction-content {
            position: relative;
            top: -5%;
            text-align: center;
            left: -1%;
            width: 50%;
            max-width: 800px;
            border-radius: 15px;
            overflow: visible;
            padding: 10px;
        }

        #instruction-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
        }

        /* КОНТЕЙНЕР ДЛЯ КНОПОК ИНСТРУКЦИИ */
        .instruction-buttons {
            position: fixed;
            top: 445px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #instruction-overlay.active .instruction-buttons {
            opacity: 1;
            pointer-events: auto;
        }

        /* ОБЩИЕ СТИЛИ ДЛЯ КНОПОК ИНСТРУКЦИИ */
        .instruction-button {
            position: relative;
            width: 60px;
            height: 60px;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            animation: snowflakeFloat 3s ease-in-out infinite;
        }

        /* СНЕЖИНКА (ЗАКРЫТИЕ) */
        #close-instruction {
            transform: translateX(-30px);
        }

        /* Голубая снежинка с синим свечением */
        #close-instruction::before {
            content: "❄";
            position: absolute;
            font-size: 52px;
            color: #87ceeb;
            text-shadow: 
                0 0 15px rgba(135, 206, 235, 1),
                0 0 30px rgba(135, 206, 235, 0.8),
                0 0 45px rgba(135, 206, 235, 0.6),
                0 0 60px rgba(30, 144, 255, 0.4);
            z-index: 1;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Белый крестик в самом центре снежинки */
        #close-instruction::after {
            content: "×";
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 8px rgba(255, 255, 255, 1),
                0 0 16px rgba(255, 255, 255, 0.8),
                0 0 24px rgba(255, 255, 255, 0.6);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transform: translateY(-1px);
            pointer-events: none;
        }

        /* КНОПКА МУЗЫКИ */
        #music-toggle {
            transform: translateX(30px);
        }

        /* Музыкальные нотки с голубым свечением */
        #music-toggle::before {
            content: "♫";
            position: absolute;
            font-size: 36px;
            color: #87ceeb;
            text-shadow: 
                0 0 15px rgba(135, 206, 235, 1),
                0 0 30px rgba(135, 206, 235, 0.8),
                0 0 45px rgba(135, 206, 235, 0.6),
                0 0 60px rgba(135, 206, 235, 0.4);
            z-index: 1;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Кружок в центре для отключенного состояния */
        #music-toggle::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Состояние "музыка выключена" */
        #music-toggle.muted::after {
            content: "×";
            color: white;
            font-size: 24px;
            font-weight: bold;
            opacity: 1;
        }

        /* Анимация плавного парения */
        @keyframes snowflakeFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-5px) rotate(30deg);
            }
            75% {
                transform: translateY(5px) rotate(-30deg);
            }
        }

        /* ХОВЕР ЭФФЕКТЫ */
        .instruction-button:hover {
            transform: scale(1.2);
        }

        #close-instruction:hover::before {
            color: #b3e5fc;
            text-shadow: 
                0 0 20px rgba(179, 229, 252, 1),
                0 0 40px rgba(135, 206, 235, 0.9),
                0 0 60px rgba(30, 144, 255, 0.7),
                0 0 80px rgba(30, 144, 255, 0.5);
        }

        #close-instruction:hover::after {
            color: #ffffff;
            text-shadow: 
                0 0 12px rgba(255, 255, 255, 1),
                0 0 24px rgba(255, 255, 255, 0.9),
                0 0 36px rgba(255, 255, 255, 0.7);
        }

        #music-toggle:hover::before {
            color: #b3e5fc;
            text-shadow: 
                0 0 20px rgba(179, 229, 252, 1),
                0 0 40px rgba(135, 206, 235, 0.9),
                0 0 60px rgba(30, 144, 255, 0.7),
                0 0 80px rgba(30, 144, 255, 0.5);
        }

        @keyframes snowflakeSpin {
            0% {
                transform: scale(1) rotate(0deg);
            }
            100% {
                transform: scale(1.2) rotate(180deg);
            }
        }

        /* ОСТАЛЬНЫЕ СТИЛИ */
        .side-ball {
            position: fixed;
            width: 200px;
            height: auto;
            z-index: 5;
            animation: swing 3s ease-in-out infinite alternate;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.6)) 
                   drop-shadow(0 12px 30px rgba(255, 215, 0, 0.1));
        }

        .side-ball.left {
            left: 40px;
            top: -60px;
            animation-delay: 0.5s;
        }

        .side-ball.right {
            right: 40px;
            top: -60px;
            animation-delay: 0.5s;
        }

        @keyframes swing {
            0% {
                transform: translateY(0) rotate(-8deg);
            }
            100% {
                transform: translateY(25px) rotate(8deg);
            }
        }

        #korobka {
            position: fixed;
            left: 50%;
            bottom: -200px;
            transform: translateX(-50%) scaleX(-1);
            width: 180px;
            height: auto;
            z-index: 8;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.7))
                    drop-shadow(0 5px 10px rgba(0, 0, 0, 0.4))
                    drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
            opacity: 0;
            transition: all 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
        }

        #korobka.visible {
            opacity: 1;
            bottom: 28px;
            animation: korobkaGlow 2s ease-in-out infinite alternate;
            transform: translateX(-50%) scaleX(-1);
        }

        @keyframes korobkaGlow {
            0% {
                filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5)) brightness(1);
            }
            100% {
                filter: drop-shadow(0 15px 30px rgba(255, 215, 0, 0.3)) brightness(1.1);
            }
        }

        /* ШАРИК С ЗАДАНИЕМ */
        #ball-container {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #ball-container.rising {
            opacity: 1;
            transform: translateX(-50%) scale(1.5);
            pointer-events: auto;
        }

        #ball-container.with-task {
            opacity: 1;
            transform: translateX(-50%) scale(1.5);
            animation: floatBall 2s ease-in-out infinite;
            pointer-events: auto;
        }

        #ball-container.shrink-fall-break {
            opacity: 1 !important;
            pointer-events: none !important;
            animation: shrinkFallAndBreak 2s ease-in forwards !important;
            will-change: transform, opacity;
        }

        #new-year-ball {
            width: 220px;
            height: auto;
            display: block;
            filter: drop-shadow(0 12px 25px rgba(0, 0, 0, 0.5))
                    drop-shadow(0 20px 40px rgba(255, 215, 0, 0.15));
        }

        /* ШАРИКИ НА ЁЛКЕ */
        .tree-ball {
            position: fixed;
            width: 70px;
            height: 70px;
            cursor: default;
            z-index: 90;
            border-radius: 50%;
            object-fit: contain;
            object-position: center;
            pointer-events: none;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5))
                    drop-shadow(0 0 25px rgba(255, 215, 0, 0.8))
                    drop-shadow(0 0 50px rgba(255, 215, 0, 0.4));
            animation: glowPulse 2s ease-in-out infinite;
        }

        /* ОСКОЛКИ ШАРИКА */
        .shard {
            position: fixed;
            width: 20px;
            height: 20px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a52, #ffd700, #ff8c00);
            border-radius: 50%;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.7));
        }

        /* МАССИВНОЕ ОБЛАКО ЗОЛОТОЙ ПЫЛИ */
        .gold-dust-particle {
            position: fixed;
            z-index: 89;
            pointer-events: none;
            opacity: 0;
            border-radius: 50%;
            background: radial-gradient(circle, 
                rgba(255, 215, 0, 0.9) 0%,
                rgba(255, 215, 0, 0.5) 40%,
                rgba(255, 215, 0, 0.2) 70%,
                transparent 100%);
            filter: blur(0.5px);
        }

        .star-particle {
            position: fixed;
            z-index: 89;
            pointer-events: none;
            opacity: 0;
            color: gold;
            text-shadow: 
                0 0 2px rgba(255, 215, 0, 0.8),
                0 0 4px rgba(255, 215, 0, 0.6);
            font-size: 3px;
        }

        /* АНИМАЦИИ ДЛЯ МАССИВНОГО ОБЛАКА ПЫЛИ */
        @keyframes dustOrbitFast1 {
            0% {
                transform: rotate(0deg) translateX(40px) rotate(0deg) scale(0.8);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: rotate(720deg) translateX(40px) rotate(-720deg) scale(0.8);
                opacity: 0;
            }
        }

        @keyframes dustOrbitFast2 {
            0% {
                transform: rotate(30deg) translateX(45px) rotate(-30deg) scale(0.7);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: rotate(750deg) translateX(45px) rotate(-750deg) scale(0.7);
                opacity: 0;
            }
        }

        @keyframes dustOrbitFast3 {
            0% {
                transform: rotate(60deg) translateX(50px) rotate(-60deg) scale(0.6);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: rotate(780deg) translateX(50px) rotate(-780deg) scale(0.6);
                opacity: 0;
            }
        }

        @keyframes dustOrbitFast4 {
            0% {
                transform: rotate(90deg) translateX(55px) rotate(-90deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: rotate(810deg) translateX(55px) rotate(-810deg) scale(0.5);
                opacity: 0;
            }
        }

        @keyframes dustOrbitFast5 {
            0% {
                transform: rotate(120deg) translateX(60px) rotate(-120deg) scale(0.4);
                opacity: 0;
            }
            10% {
                opacity: 0.2;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: rotate(840deg) translateX(60px) rotate(-840deg) scale(0.4);
                opacity: 0;
            }
        }

        @keyframes dustOrbitFast6 {
            0% {
                transform: rotate(150deg) translateX(65px) rotate(-150deg) scale(0.3);
                opacity: 0;
            }
            10% {
                opacity: 0.1;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: rotate(870deg) translateX(65px) rotate(-870deg) scale(0.3);
                opacity: 0;
            }
        }

        @keyframes dustOrbitFast7 {
            0% {
                transform: rotate(180deg) translateX(70px) rotate(-180deg) scale(0.2);
                opacity: 0;
            }
            10% {
                opacity: 0.05;
            }
            90% {
                opacity: 0.05;
            }
            100% {
                transform: rotate(900deg) translateX(70px) rotate(-900deg) scale(0.2);
                opacity: 0;
            }
        }

        /* Анимации для хаотичного движения сотен частиц */
        @keyframes dustSwarm1 {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 0.4;
                transform: translate(-20px, -15px) scale(0.8);
            }
            40% {
                opacity: 0.3;
                transform: translate(-30px, 10px) scale(0.7);
            }
            60% {
                opacity: 0.4;
                transform: translate(15px, -25px) scale(0.6);
            }
            80% {
                opacity: 0.3;
                transform: translate(25px, 20px) scale(0.5);
            }
            100% {
                transform: translate(40px, -40px) scale(0.4);
                opacity: 0;
            }
        }

        @keyframes dustSwarm2 {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 0.4;
                transform: translate(25px, -10px) scale(0.8);
            }
            40% {
                opacity: 0.3;
                transform: translate(35px, 15px) scale(0.7);
            }
            60% {
                opacity: 0.4;
                transform: translate(-10px, -30px) scale(0.6);
            }
            80% {
                opacity: 0.3;
                transform: translate(-20px, 25px) scale(0.5);
            }
            100% {
                transform: translate(-35px, -35px) scale(0.4);
                opacity: 0;
            }
        }

        @keyframes dustSwarm3 {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 0.4;
                transform: translate(-15px, 20px) scale(0.8);
            }
            40% {
                opacity: 0.3;
                transform: translate(-25px, -15px) scale(0.7);
            }
            60% {
                opacity: 0.4;
                transform: translate(30px, 10px) scale(0.6);
            }
            80% {
                opacity: 0.3;
                transform: translate(20px, -20px) scale(0.5);
            }
            100% {
                transform: translate(35px, 30px) scale(0.4);
                opacity: 0;
            }
        }

        /* Анимация для мерцания */
        @keyframes dustTwinkleFast {
            0%, 100% {
                opacity: 0.1;
                transform: scale(0.5);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.2);
            }
        }

        @keyframes dustTwinkleSlow {
            0%, 100% {
                opacity: 0.05;
                transform: scale(0.3);
            }
            50% {
                opacity: 0.6;
                transform: scale(1);
            }
        }

        @keyframes floatBall {
            0%, 100% { transform: translateX(-50%) scale(1.5) translateY(0); }
            50% { transform: translateX(-50%) scale(1.5) translateY(-15px); }
        }

        /* АНИМАЦИЯ ПАДЕНИЯ */
        @keyframes shrinkFallAndBreak {
            0% {
                transform: translateX(-50%) translateY(0) scale(1.5);
                opacity: 1;
            }
            25% {
                transform: translateX(-50%) translateY(20vh) scale(1.2);
                opacity: 0.9;
            }
            50% {
                transform: translateX(-50%) translateY(40vh) scale(0.8);
                opacity: 0.8;
            }
            75% {
                transform: translateX(-50%) translateY(60vh) scale(0.4) rotate(180deg);
                opacity: 0.6;
            }
            90% {
                transform: translateX(-50%) translateY(80vh) scale(0.15) rotate(360deg);
                opacity: 0.3;
                filter: blur(3px);
            }
            100% {
                transform: translateX(-50%) translateY(120vh) scale(0) rotate(540deg);
                opacity: 0;
                filter: blur(5px);
            }
        }

        @keyframes pickFromBox {
            0% {
                transform: translateX(-50%) scale(1.5);
                opacity: 1;
            }
            30% {
                transform: translateX(-50%) scale(1.3);
                top: 130px;
                opacity: 0.9;
            }
            60% {
                transform: translateX(-50%) scale(1.0);
                top: 210px;
                opacity: 0.8;
            }
            90% {
                transform: translateX(-50%) scale(0.9);
                top: 260px;
                opacity: 0.7;
            }
            100% {
                transform: translateX(-50%) scale(0.9);
                opacity: 1;
                top: 280px;
            }
        } 
         
        #ball-container.picking-from-box {
            opacity: 1 !important;
            pointer-events: none !important;
            animation: pickFromBox 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
            z-index: 30 !important;
            will-change: transform, top;
            backface-visibility: hidden;
        }

        /* АНИМАЦИЯ ОСКОЛКОВ */
        @keyframes shard1 {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-60px, 120px) scale(0); opacity: 0; }
        }

        @keyframes shard2 {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(80px, 100px) scale(0); opacity: 0; }
        }

        @keyframes shard3 {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-40px, 80px) scale(0); opacity: 0; }
        }

        @keyframes shard4 {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(60px, 60px) scale(0); opacity: 0; }
        }

        @keyframes shard5 {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(0, 150px) scale(0); opacity: 0; }
        }

        @keyframes shard6 {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-80px, 60px) scale(0); opacity: 0; }
        }

        /* ТЕКСТ НА ШАРИКЕ */
        .ball-text {
            position: absolute;
            top: 53%; 
            left: 50%;
            transform: translateX(-50%);
            color: #000;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            z-index: 16;
            pointer-events: none;
            width: 85%;
            padding: 8px 5px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
            transition: opacity 0.5s ease;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hint-text {
            font-size: 14px;
            color: #444;
            margin-top: 3px;
            display: block;
            white-space: normal;
        }

        /* КНОПКИ С БУКВАМИ */
        .letter-options {
            position: absolute;
            top: 73% !important;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 17;
            flex-wrap: wrap;
            justify-content: center;
            width: 85%;
        }

        .letter-option {
            width: 40px !important;
            height: 40px !important;
            background: linear-gradient(45deg, #ff9800, #ffb74d, #ff9800, #ffcc80, #ff9800);
            background-size: 400% 400%;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px !important;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: gradientShift 3s ease infinite;
            flex-shrink: 0;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .letter-option:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .letter-option.correct {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            transform: scale(1.1);
        }

        .letter-option.wrong {

        const BALL_TOP_POSITION = '40px';

        function adaptBallToScreen() {
            const ball = document.getElementById('new-year-ball');
            const ballText = document.getElementById('ball-text');
            const letterOptions = document.getElementById('letter-options');
            
            if (!ball || ball.offsetWidth === 0) return;
            
            const ballWidth = ball.offsetWidth;
            
            if (ballText) {
                const textWidth = ballWidth * 0.85;
                ballText.style.width = textWidth + 'px';
                ballText.style.fontSize = Math.max(14, Math.min(ballWidth * 0.08, 22)) + 'px';
            }

                const snegurkaRect = snegurkaButton.getBoundingClientRect();
                const centerX = snegurkaRect.left + snegurkaRect.width / 2;
                const centerY = snegurkaRect.top + snegurkaRect.height / 2;
                
                // Обновляем свечение
                if (snegurkaGlow) {
                    snegurkaGlow.style.left = (centerX - 140) + 'px';
                    snegurkaGlow.style.top = (centerY - 140) + 'px';
                }
                
                // Обновляем частицы
                snegurkaParticles.forEach((particle, index) => {
                    if (!particle || !particle.parentNode) return;
                    
                    const angle = (index / snegurkaParticles.length) * Math.PI * 2;
                    const radius = 60 + (index % 5) * 20;
                    
                    particle.style.left = (centerX + Math.cos(angle) * radius) + 'px';
                    particle.style.top = (centerY + Math.sin(angle) * radius) + 'px';
                });
            }

                }
            }
            
            // Скрыть инструкцию
            function hideInstruction() {
                instructionOverlay.classList.remove('active');
                
                if (musicPlaying) {
                    instructionMusic.pause();
                    instructionMusic.currentTime = 0;
                    musicPlaying = false;
                }
            }
            
            // Обработчик закрытия инструкции
            closeInstruction.addEventListener('click', hideInstruction);
            
            // Обработчик переключения музыки
            musicToggle.addEventListener('click', toggleInstructionMusic);
            
            // Закрытие инструкции по клику на фон
            instructionOverlay.addEventListener('click', function(e) {
                if (e.target === instructionOverlay) {
                    hideInstruction();
                }
            });
            
            // Функция для определения оценки
            function calculateGrade(correct) {
                if (correct >= 19) return { grade: '5', text: 'Отлично!' };
                if (correct >= 15) return { grade: '4', text: 'Хорошо!' };
                if (correct >= 9) return { grade: '3', text: 'Удовлетворительно' };
                return { grade: '2', text: 'Попробуйте еще раз' };
            }
            
            // Функция для показа результатов
            function showResults() {
                const gradeInfo = calculateGrade(correctAnswers);

                if (gradeInfo.grade === '5') {
                  window.parent.postMessage({ type: "boardSuccess" }, "*");
            }
                resultScore.textContent = correctAnswers;
                resultGrade.textContent = gradeInfo.grade;
                resultTitle.textContent = gradeInfo.text;
                resultText.textContent = `Вы набрали ${correctAnswers} баллов из 20`;
                
                checkButton.style.display = 'none';
                korobka.style.display = 'none';
                sideBallLeft.style.display = 'none';
                sideBallRight.style.display = 'none';
                document.getElementById('counter').style.display = 'none';
                
                if (gradeInfo.grade === '5' || gradeInfo.grade === '4') {
                    videoBackground.src = 'video/2v1.mp4';
                    videoBackground.loop = false; 
                    videoBackground.muted = false;
                    videoBackground.load();
                    videoBackground.play().catch(handleVideoError);
                    
                    // после окончания видео
                    videoBackground.onended = function () {

                   // остановить видео
                   videoBackground.pause();

                   // закрыть окно игры
                   window.close();
              };
                    
                    closeResultButton.style.display = 'block';
                    resultButtons.style.display = 'none';
                } else {
                    videoBackground.muted = true;
                    closeResultButton.style.display = 'none';
                    resultButtons.style.display = 'flex';
                }
                
                resultMessage.style.display = 'block';
            }
            
            // Функция для перезапуска игры
            function restartGame() {
                availableTasks = [...tasks];
                correctAnswers = 0;
                ballCanHang = false;
                ballPlaced = false;
                taskActive = false;
                fairyAnimationInProgress = false;
                
                // Удаляем все шарики
                document.querySelectorAll('.tree-ball').forEach(ball => ball.remove());
                
                // Удаляем все частицы
                document.querySelectorAll('.gold-dust-particle, .star-particle, .snegurka-particle').forEach(el => {
                    if (el.parentNode) el.remove();
                });
                
                // Удаляем все осколки
                document.querySelectorAll('.shard').forEach(el => {
                    if (el.parentNode) el.remove();
                });
                
                // Очищаем хранилище частиц
                permanentDustClouds.forEach((dustCloud, ballId) => {
                    dustCloud.particles.forEach(particle => {
                        if (particle && particle.parentNode) {
                            particle.remove();
                        }
                    });
                });
                permanentDustClouds.clear();
                snegurkaParticles = [];
                
                if (fairyContainer) {
                    fairyContainer.style.display = 'none';
                }
                
                videoBackground.src = 'video/2v.mp4';
                videoBackground.muted = true;
                videoBackground.load();
                videoBackground.play().catch(handleVideoError);
                
                korobka.style.display = 'block';
                sideBallLeft.style.display = 'block';
                sideBallRight.style.display = 'block';
                document.getElementById('counter').style.display = 'flex';
                
                resultMessage.style.display = 'none';
                closeResultButton.style.display = 'none';
                
                if (availableTasks.length === 0) {
                    checkButton.style.display = 'block';
                } else {
                    checkButton.style.display = 'none';
                }
                
                updateCounters();
                
                ballContainer.style.opacity = '0';
                ballContainer.classList.remove('with-task');
                letterOptions.style.display = 'none';
                
                korobka.classList.add('visible');
                
                // Пересоздаем частицы Снегурки
                setTimeout(() => {
                    createSnegurkaParticles();
                }, 500);
            }
            
            // Обработчики для кнопок
            closeResult.addEventListener('click', function() {
                resultMessage.style.display = 'none';
                closeResultButton.style.display = 'none';
            });
            
            closeResultButton.addEventListener('click', function() {
                resultMessage.style.display = 'none';
                closeResultButton.style.display = 'none';
            });
            
            restartButton.addEventListener('click', restartGame);
            
            // Обработчик для кнопки ПРОВЕРИТЬ
            checkButton.addEventListener('click', showResults);
            
            function updateCounters() {
                correctCounter.textContent = correctAnswers;
                tasksLeft.textContent = availableTasks.length;
                
                if (availableTasks.length === 0) {
                    checkButton.style.display = 'block';
                } else {
                    checkButton.style.display = 'none';
                }
            }
            
            function startSwayAnimation() {
                let angle = 0;
                let direction = 1;
                const maxAngle = 5;
                const speed = 0.05;
                
                function sway() {
                    angle += speed * direction;
                    
                    if (angle > maxAngle || angle < -maxAngle) {
                        direction *= -1;
                    }
                    
                    snegurkaButton.style.transform = `rotate(${angle}deg)`;
                    requestAnimationFrame(sway);
                }
                
                sway();
            }
            
            // ФИКС 4: Исправление утечек памяти в createShards
            function createShards(x, y) {
                const shardCount = 6;
                const shardAnimations = [
                    'shard1 1s ease-out forwards',
                    'shard2 1s ease-out forwards',
                    'shard3 1s ease-out forwards',
                    'shard4 1s ease-out forwards',
                    'shard5 1s ease-out forwards',
                    'shard6 1s ease-out forwards'
                ];
                
                const shardColors = [
                    'linear-gradient(45deg, #ff6b6b, #ee5a52)',
                    'linear-gradient(45deg, #ffd700, #ff8c00)',
                    'linear-gradient(45deg, #2ecc71, #27ae60)',
                    'linear-gradient(45deg, #3498db, #2980b9)',
                    'linear-gradient(45deg, #9b59b6, #8e44ad)',
                    'linear-gradient(45deg, #ff6b6b, #ff8c00)'
                ];
                
                const shards = [];
                const fragment = document.createDocumentFragment();
                
                for (let i = 0; i < shardCount; i++) {
                    const shard = document.createElement('div');
                    shard.className = 'shard';
                    shard.style.left = x + 'px';
                    shard.style.top = y + 'px';
                    shard.style.background = shardColors[i];
                    shard.style.animation = shardAnimations[i];
                    shard.style.width = (15 + Math.random() * 15) + 'px';
                    shard.style.height = (15 + Math.random() * 15) + 'px';
                    shard.style.opacity = '0.9';
                    
                    fragment.appendChild(shard);
                    shards.push(shard);
                }
                
                document.body.appendChild(fragment);
                
                setTimeout(() => {
                    shards.forEach(shard => {
                        if (shard.parentNode) {
                            shard.style.opacity = '0';
                            shard.style.transition = 'opacity 0.5s ease';
                            setTimeout(() => {
                                if (shard.parentNode) shard.remove();
                            }, 500);
                        }
                    });
                }, 1500);
            }
            
            function getRandomTask() {
                if (availableTasks.length === 0) return null;
                const randomIndex = Math.floor(Math.random() * availableTasks.length);
                return availableTasks[randomIndex];
            }
            
            function removeTask(task) {
                const index = availableTasks.indexOf(task);
                if (index > -1) {
                    availableTasks.splice(index, 1);
                }
            }
            
            function showKorobka() {
                setTimeout(() => {
                    korobka.classList.add('visible');
                    setTimeout(() => {
                        showInstruction();
                    }, 500);
                }, 2000);
            }
            
            function showSnegurka() {
                setTimeout(() => {
                    snegurkaButton.classList.add('visible');
                    if (snegurkaGlow) {
                        snegurkaGlow.style.opacity = '0.7';
                    }
                    startSwayAnimation();
                    
                    // Добавляем сияние через секунду
                    setTimeout(() => {
                        createSnegurkaParticles();
                    }, 1000);
                }, 1000);
            }
            
            function setBallPosition() {
                ballContainer.style.top = BALL_TOP_POSITION;
            }
            
            function showNewTask() {
                if (availableTasks.length === 0) {
                    return;
                }
                
                const task = getRandomTask();
                if (!task) return;
                
                console.log('Новое задание:', task.word);
                
                ballContainer.className = '';
                ballContainer.style.left = '50%';
                setBallPosition();
                ballContainer.style.transform = 'translateX(-50%)';
                ballContainer.style.opacity = '0';
                
                newYearBall.src = 'Shar/' + task.image;
                newYearBall.onerror = function() {
                    this.src = 'Shar/S3.png';
                };
                
                ballText.innerHTML = task.word.replace('...', '..') + 
                    (task.hint ? '<br><span class="hint-text">' + task.hint + '</span>' : '');
                
                letterOptions.innerHTML = '';
                task.options.forEach(letter => {
                    const button = document.createElement('button');
                    button.className = 'letter-option';
                    button.setAttribute('data-letter', letter);
                    button.textContent = letter;
                    button.dataset.taskWord = task.word;
                    letterOptions.appendChild(button);
                });
                
                ballContainer.style.opacity = '1';
                ballContainer.dataset.currentTask = task.word;
                
                setTimeout(() => {
                    ballContainer.classList.add('rising');
                    setTimeout(() => {
                        adaptBallToScreen();
                    }, 100);
                }, 50);
                
                setTimeout(() => {
                    ballContainer.classList.remove('rising');
                    ballContainer.classList.add('with-task');
                    letterOptions.style.display = 'flex';
                    taskActive = true;
                    
                    setTimeout(adaptBallToScreen, 300);
                }, 800);
            }
            
            korobka.addEventListener('click', function() {
                if (!taskActive && !ballPlaced) {
                    showNewTask();
                }
            });
            
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('letter-option') && taskActive) {
                    const selectedLetter = e.target.getAttribute('data-letter');
                    const taskWord = e.target.dataset.taskWord;
                    const task = tasks.find(t => t.word === taskWord);
                    
                    if (!task) return;
                    
                    const letterButtons = document.querySelectorAll('.letter-option');
                    
                    letterButtons.forEach(btn => btn.style.pointerEvents = 'none');
                    
                    letterButtons.forEach(btn => {
                        if (btn.getAttribute('data-letter') === task.correct) {
                            btn.classList.add('correct');
                        } else {
                            btn.classList.add('wrong');
                        }
                    });
                    
                    setTimeout(() => {
                        if (selectedLetter === task.correct) {
                            correctAnswers++;
                            removeTask(task);
                            
                            ballText.innerHTML = task.word.replace('...', 
                                '<span style="color: #2ecc71">' + task.correct + '</span>') + 
                                (task.hint ? '<br><span class="hint-text">' + task.hint + '</span>' : '');
                            
                            playNextCorrectSound();
                            
                            setTimeout(() => {
                                ballContainer.classList.remove('with-task');
                                letterOptions.style.display = 'none';
                                
                                ballText.style.opacity = '0';
                                ballText.style.transition = 'opacity 0.5s ease';
                                
                                setTimeout(() => {
                                    ballContainer.style.position = 'fixed';
                                    setBallPosition();
                                    ballContainer.style.left = '50%';
                                    ballContainer.style.transform = 'translateX(-50%) scale(1.5)';
                                    ballContainer.style.opacity = '1';
                                    ballContainer.style.zIndex = '30';
                                    
                                    ballContainer.classList.add('picking-from-box');
                                    
                                    setTimeout(() => {
                                        ballContainer.style.opacity = '0';
                                        ballContainer.classList.remove('picking-from-box');
                                        
                                        ballText.style.opacity = '1';
                                        
                                        createTinyBall('Shar/' + task.image);
                                        
                                        if (currentTinyBall) {
                                            const korobkaRect = korobka.getBoundingClientRect();
                                            currentTinyBall.style.left = (korobkaRect.left + korobkaRect.width / 2) + 'px';
                                            currentTinyBall.style.top = (korobkaRect.top + korobkaRect.height / 2 - 20) + 'px';
                                            currentTinyBall.style.transform = 'translate(-50%, -50%) scale(0.9)';
                                            currentTinyBall.style.transition = 'transform 0.3s ease';
                                            
                                            korobka.style.filter = 'drop-shadow(0 0 25px rgba(255, 215, 0, 0.8)) brightness(1.1)';
                                            setTimeout(() => {
                                                korobka.style.filter = '';
                                            }, 1000);
                                        }
                                        
                                        taskActive = false;
                                        updateCounters();
                                        
                                    }, 1000);
                                    
                                }, 300);
                                
                            }, 700);
                            
                        } else {
                            ballText.innerHTML = task.word.replace('...', 
                                '<span style="color: #e74c3c">' + selectedLetter + '</span>') + 
                                (task.hint ? '<br><span class="hint-text">' + task.hint + '</span>' : '');
                            
                            removeTask(task);
                            
                            setTimeout(() => {
                                letterOptions.style.display = 'none';
                                ballContainer.classList.remove('with-task');
                                
                                ballText.style.opacity = '0';
                                ballText.style.transition = 'opacity 0.5s ease';
                                
                                ballContainer.style.position = 'fixed';
                                setBallPosition();
                                ballContainer.style.left = '50%';
                                ballContainer.style.transform = 'translateX(-50%) scale(1.5)';
                                ballContainer.style.zIndex = '30';

                                ballContainer.className = '';
                                ballContainer.classList.add('shrink-fall-break');
                                
                                setTimeout(() => {
                                    breakSound.currentTime = 0;
                                    breakSound.play().catch(e => console.log('Звук не воспроизвелся'));
                                    
                                    const viewportWidth = window.innerWidth;
                                    const viewportHeight = window.innerHeight;
                                    createShards(viewportWidth / 2, viewportHeight - 100);
                                }, 1800);
                                
                                setTimeout(() => {
                                    ballContainer.style.opacity = '0';
                                    ballContainer.classList.remove('shrink-fall-break');
                                    ballText.style.opacity = '1';
                                    taskActive = false;
                                    updateCounters();
                                }, 2200);
                            }, 1000);
                        }
                    }, 1000);
                }
            });
            
            // ФИКС 1: Исправление JS ошибки с currentTinyBall
            function createTinyBall(imageSrc) {
                if (currentTinyBall) {
                    currentTinyBall.remove();
                }
                
                currentTinyBall = document.createElement('img');
                currentTinyBall.className = 'tiny-ball';
                currentTinyBall.src = imageSrc;
                currentTinyBall.style.left = '50%';
                currentTinyBall.style.top = '50%';
                currentTinyBall.style.opacity = '1';
                currentTinyBall.style.transform = 'translate(-50%, -50%)';
                
                document.body.appendChild(currentTinyBall);
                
                ballCanHang = true;
                ballPlaced = false;
                
                setupDragListeners(currentTinyBall);
            }
            
            function setupDragListeners(ball) {
                ball.addEventListener('mousedown', startDrag);
                ball.addEventListener('touchstart', startDragTouch, { passive: false });
            }
            
            function startDrag(e) {
                if (ballCanHang && !ballPlaced) {
                    isDragging = true;
                    
                    // Центрируем захват
                    const rect = currentTinyBall.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const clientX = e.clientX || e.touches[0].clientX;
                    const clientY = e.clientY || e.touches[0].clientY;
                    
                    dragOffsetX = clientX - centerX;
                    dragOffsetY = clientY - centerY;
                    
                    currentTinyBall.style.cursor = 'grabbing';
                    currentTinyBall.style.transition = 'none';
                    e.preventDefault();
                }
            }
            
            function startDragTouch(e) {
                startDrag(e);
            }
            
            document.addEventListener('mousemove', function(e) {
                if (isDragging && ballCanHang && !ballPlaced && currentTinyBall) {
                    currentTinyBall.style.left = (e.clientX - dragOffsetX) + 'px';
                    currentTinyBall.style.top = (e.clientY - dragOffsetY) + 'px';
                    currentTinyBall.style.transform = 'none';
                }
            });
            
            document.addEventListener('touchmove', function(e) {
                if (isDragging && ballCanHang && !ballPlaced && currentTinyBall) {
                    const touch = e.touches[0];
                    currentTinyBall.style.left = (touch.clientX - dragOffsetX) + 'px';
                    currentTinyBall.style.top = (touch.clientY - dragOffsetY) + 'px';
                    currentTinyBall.style.transform = 'none';
                    e.preventDefault();
                }
            }, { passive: false });
            
            document.addEventListener('mouseup', function() {
                if (isDragging && ballCanHang && !ballPlaced && currentTinyBall) {
                    isDragging = false;
                    currentTinyBall.style.cursor = 'grab';
                    currentTinyBall.style.transition = 'all 0.3s ease';
                    checkIfOnTree();
                }
            });
            
            document.addEventListener('touchend', function(e) {
                if (isDragging && ballCanHang && !ballPlaced && currentTinyBall) {
                    isDragging = false;
                    currentTinyBall.style.transition = 'all 0.3s ease';
                    checkIfOnTree();
                    e.preventDefault();
                }
            });
            
            document.addEventListener('touchcancel', function(e) {
                if (isDragging) {
                    isDragging = false;
                    if (currentTinyBall) {
                        currentTinyBall.style.transition = 'all 0.3s ease';
                    }
                    e.preventDefault();
                }
            });
            
            function checkIfOnTree() {
                const rect = currentTinyBall.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                ballPlaced = true;
                ballCanHang = false;
                
                const treeBall = document.createElement('img');
                treeBall.className = 'tree-ball';
                treeBall.src = currentTinyBall.src;
                treeBall.style.left = (centerX - 35) + 'px';
                treeBall.style.top = (centerY - 35) + 'px';
                
                const ballId = 'ball_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                treeBall.dataset.ballId = ballId;
                
                document.body.appendChild(treeBall);
                
                // Создаем ПОСТОЯННОЕ облако частиц вокруг шарика
                createPermanentDustCloud(centerX, centerY, ballId);
                
                // Показываем анимацию феи (без сверхсвечения)
                showFairyAnimation(centerX, centerY);
                
                setTimeout(() => {
                    if (currentTinyBall.parentNode) {
                        currentTinyBall.remove();
                    }
                    currentTinyBall = null;
                    ballPlaced = false;
               }, 300);
            }
            
            snegurkaButton.addEventListener('click', function() {
                alert('Снегурка: продолжайте украшать ёлку!');
            });
            
            // ИНИЦИАЛИЗАЦИЯ
            showKorobka();
            showSnegurka();
            updateCounters();
            
            window.addEventListener('resize', function() {
                adaptBallToScreen();
                updateSnegurkaParticles();
            });
            
            console.log('Игра загружена! Снегурка с сиянием готова!');
            
            setTimeout(() => {
                if (instructionMusic.paused) {
                    musicToggle.classList.add('muted');
                    musicPlaying = false;
                } else {
                    musicToggle.classList.remove('muted');
                    musicPlaying = true;
                }
            }, 200);
        });
    </script>
</body>
